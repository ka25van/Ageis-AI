global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'aegis-backend'
    metrics_path: /api/v1/observability/metrics
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'aegis-backend'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

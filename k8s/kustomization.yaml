apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: aegis

commonLabels:
  app.kubernetes.io/managed-by: kustomize

resources:
  - namespace.yaml
  - config.yaml
  - secrets.yaml
  - postgres.yaml
  - redis.yaml
  - ollama.yaml
  - backend.yaml
  - frontend.yaml
  - prometheus.yaml
  - ingress.yaml
  - rbac.yaml

images:
  - name: aegis-backend
    newName: aegis-backend
    newTag: latest
  - name: aegis-frontend
    newName: aegis-frontend
    newTag: latest

apiVersion: v1
kind: ConfigMap
metadata:
  name: aegis-config
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis
    app.kubernetes.io/part-of: aegis-ai
data:
  # --- Backend environment overrides ---
  REDIS_URL: "redis://redis:6379/0"
  OLLAMA_BASE_URL: "http://ollama:11434"
  LLM_PROVIDER: "ollama"
  OLLAMA_MODEL: "llama3.2"
  EMBEDDING_MODEL: "nomic-embed-text"
  LOG_LEVEL: "INFO"
  BACKEND_CORS_ORIGINS: '["http://localhost:5173","http://localhost:80","http://localhost:3000"]'
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "30"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  PROJECT_NAME: "Aegis AI"
  VERSION: "0.1.0"
  API_V1_STR: "/api/v1"
  MAX_TOKENS: "4096"
  TEMPERATURE: "0.7"
  OPENAI_MODEL: "gpt-4o-mini"
  REPOSITORY_FILE_LIMIT: "200"
  BATCH_FILE_LIMIT: "500"
  FILE_PREVIEW_LIMIT: "50"
  FILE_PREVIEW_CHARS: "300"
  CONTEXT_TRUNCATION_LIMIT: "30"
  SIMILARITY_THRESHOLD: "0.3"

  # --- Prometheus scrape config ---
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
    scrape_configs:
      - job_name: 'aegis-backend'
        metrics_path: /api/v1/observability/metrics
        static_configs:
          - targets: ['backend:8000']
            labels:
              service: 'aegis-backend'
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

  # --- Nginx config for frontend ---
  nginx.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/css application/javascript application/json image/svg+xml;
        gzip_comp_level 6;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/v1/ {
            proxy_pass http://backend:8000/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
        }
    }

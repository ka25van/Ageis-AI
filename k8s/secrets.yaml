apiVersion: v1
kind: Secret
metadata:
  name: aegis-secrets
  namespace: aegis
  labels:
    app.kubernetes.io/name: aegis
    app.kubernetes.io/part-of: aegis-ai
type: Opaque
stringData:
  # Override these for production:
  #   kubectl create secret generic aegis-secrets -n aegis \
  #     --from-literal=DATABASE_URL='postgresql+asyncpg://postgres:CHANGE_ME@postgres:5432/aegis' \
  #     --from-literal=SECRET_KEY='CHANGE_ME' \
  #     --from-literal=POSTGRES_PASSWORD='CHANGE_ME'
  #
  # The values below are safe for local/dev clusters only.
  DATABASE_URL: "postgresql+asyncpg://postgres:aegis-postgres-pw@postgres:5432/aegis"
  SECRET_KEY: "dev-secret-key-change-in-production-k8s"
  POSTGRES_PASSWORD: "aegis-postgres-pw"

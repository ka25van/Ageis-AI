services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init-db.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    ports:
      - "${REDIS_PORT:-6379}"

  # ollama:
  #   ports:
  #     - "${OLLAMA_PORT:-11434}"
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

  backend:
    environment:
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-["https://app.aegis.ai"]}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      LOG_LEVEL: WARNING
    ports:
      - "${BACKEND_PORT:-8000}"
    volumes: []

  frontend:
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes: []
